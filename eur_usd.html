<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>EUR/USD - Analisi FOREXcross</title>
                <link rel="stylesheet" href="style.css">
                    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
                    </head>
                    <body>
                        <div class="background-overlay"></div>

                            <div class="container">
                                    <header>
                                                <div class="logo-container" onclick="location.href='dashboard.html'" style="cursor: pointer;">
                                                                <img src="https://raw.githubusercontent.com/Edoardo1953/FOREXcross/main/assets/FOREXcross-Logo.webp" alt="FOREXcross Logo" class="logo">
                                                                                <h1>FOREXcross</h1>
                                                                                            </div>
                                                                                                        <nav>
                                                                                                                        <button onclick="location.href='dashboard.html'" class="btn" id="back-btn">Torna alla Dashboard</button>
                                                                                                                                    </nav>
                                                                                                                                            </header>
                                                                                                                                            
                                                                                                                                                    <main>
                                                                                                                                                                <section class="analysis-header">
                                                                                                                                                                                <h2 id="pair-title">Cambio EUR / USD</h2>
                                                                                                                                                                                                <div class="price-display">
                                                                                                                                                                                                                    <span id="current-price">1.0845</span>
                                                                                                                                                                                                                                        <span id="price-change" class="up">+0.0012 (0.11%)</span>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                    </section>
                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                <section class="chart-container-large">
                                                                                                                                                                                                                                                                                                <div id="main-chart"></div>
                                                                                                                                                                                                                                                                                                                <div class="chart-controls">
                                                                                                                                                                                                                                                                                                                                    <button class="timeframe-btn active">1D</button>
                                                                                                                                                                                                                                                                                                                                                        <button class="timeframe-btn">1W</button>
                                                                                                                                                                                                                                                                                                                                                                            <button class="timeframe-btn">1M</button>
                                                                                                                                                                                                                                                                                                                                                                                                <button class="timeframe-btn">1Y</button>
                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                            </section>
                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                        <section class="converter-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3 id="conv-title">Convertitore Rapido</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="number" id="from-amount" value="1">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="currency-label">EUR</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="swap-icon">^v</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="number" id="to-amount" readonly>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span class="currency-label">USD</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </section>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </main>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <footer>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>(c) 2024 FOREXcross. <span id="footer-text-eurusd">Analisi di mercato in tempo reale.</span></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </footer>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script src="translations.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="app.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Logica specifica per il grafico (mock)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const chartElement = document.getElementById('main-chart');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const chart = LightweightCharts.createChart(chartElement, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            width: chartElement.clientWidth,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        height: 400,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    layout: {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    backgroundColor: 'transparent',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    textColor: '#d1d4dc',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            grid: {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            vertLines: { color: 'rgba(42, 46, 57, 0.5)' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            horzLines: { color: 'rgba(42, 46, 57, 0.5)' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const lineSeries = chart.addLineSeries();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                lineSeries.setData([
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            { time: '2024-01-01', value: 1.0850 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        { time: '2024-01-02', value: 1.0862 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    { time: '2024-01-03', value: 1.0845 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                { time: '2024-01-04', value: 1.0830 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            { time: '2024-01-05', value: 1.0845 },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ]);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
